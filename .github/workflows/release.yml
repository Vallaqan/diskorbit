name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Release — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86-64
            os: windows-latest
            asset: diskorbit-windows-x86_64.exe

          - name: Linux x86-64
            os: ubuntu-latest
            asset: diskorbit-linux-x86_64

          - name: macOS Universal
            os: macos-latest
            asset: diskorbit-macos-universal

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libx11-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev

      - name: Add macOS cross-compilation targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cargo build --release
          cp target/release/diskorbit.exe ${{ matrix.asset }}

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo build --release
          cp target/release/diskorbit ${{ matrix.asset }}

      # ── macOS universal binary ─────────────────────────────────────────────
      - name: Build universal binary (macOS)
        if: runner.os == 'macOS'
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create -output ${{ matrix.asset }} \
            target/aarch64-apple-darwin/release/diskorbit \
            target/x86_64-apple-darwin/release/diskorbit

      # ── Upload ─────────────────────────────────────────────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true
